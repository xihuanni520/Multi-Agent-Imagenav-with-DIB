habitat_baselines:
  rl:
    success_reward: 10.0
    slack_reward: -0.01


habitat:
  env_task: MultiGymHabitatEnvX
  task:
    reward_measure: distance_to_view
    success_measure: view_match
    measurements: [distance_to_goal, success, spl, soft_spl, distance_to_view, view_match, view_angle]
    sensors: [imagegoal_sensor_v2, panoramic_rgb_sensor]
    imagegoal_sensor_v2:
      type: "ImageGoalSensorV2"
      channels: "rgb"
      sampling_type: "uniform"
      bias: [0, 0, 0]
      augmentation:
        activate: False
        hfov: [60, 120]
        height: [-0.45, 0.25]
        pitch: [-5, 5]
    panoramic_rgb_sensor:
      type: "PanoramicRGBSensor"
      channels: "rgb"
