habitat_baselines:
  verbose: False
  base_task_config_path: "exp_config/base_task_config/imagenav_gibson_multi.yaml"
  trainer_name: "ddppo-zsvln"
  simulator_gpu_id: 0
  torch_gpu_id: 0
  video_option: []
  tensorboard_dir: "results/imagenav_multi/tb"
  video_dir: "video_dir"
  test_episode_count: -1
  eval_ckpt_path_dir: "results/imagenav_multi"
  num_environments: 3
  sensors: ["rgb_sensor"]
  checkpoint_folder: "results/imagenav_multi"
  num_updates: -1
  total_num_steps: 1e9
  log_interval: 50
  log_file: "results/imagenav_multi/train.log"
  num_checkpoints: 100
  force_torch_single_threaded: True

  eval:
    cam_visual: False

  rl:
    success_reward: 2.5
    slack_reward: -1e-4

    policy:
      name: "PointNavResNetPolicy"

    ppo:
      clip_param: 0.2
      ppo_epoch: 2
      num_mini_batch: 1
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2
      num_steps: 64
      use_gae: True
      visual_obs_inputs: ["panoramic_rgb_sensor", "imagegoal_sensor_v2"]
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 512
      rollout_on_cpu: True
      use_double_buffered_sampler: False
    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained_weights: data/model_data/gibson-2plus-resnet50.pth
      pretrained: False
      pretrained_encoder: False
      train_encoder: True
      reset_critic: True
      backbone: resnet50
      rnn_type: LSTM
      num_recurrent_layers: 2
