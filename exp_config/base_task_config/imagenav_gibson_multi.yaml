habitat:
  env_task: MultiGymHabitatEnvX
  environment:
    type: gibson
    max_episode_steps: 1000
    iterator_options:
      max_scene_repeat_steps: 50000
  simulator:
    scene:
      "data/scene_datasets/gibson/Ackermanville.glb"
    agent_0:
      sensors: ["rgb_sensor"]
    habitat_sim_v0:
      gpu_device_id: 0
    rgb_sensor:
      width: 256
      height: 256
  task:
    type: Nav-v0
    end_on_success: False
    parallel_sub_envs: True
    reward_measure: "distance_to_goal_reward"
    success_measure: "spl"
    sensors: ["imagegoal_sensor_v2", "panoramic_rgb_sensor"]
    imagegoal_sensor_v2:
      type: "ImageGoalSensorV2"
      channels: "rgb"
      sampling_type: "uniform"
      bias: [0, 0, 0]
      augmentation:
        activate: False
        hfov: [60, 120]
        height: [-0.45, 0.25]
        pitch: [-5, 5]
    panoramic_rgb_sensor:
      type: "PanoramicRGBSensor"
      channels: "rgb"
    measurements:
      ["distance_to_goal", "success", "spl", "soft_spl", "distance_to_goal_reward"]
    success:
      success_distance: 1.0
    num_agents: 3

  dataset:
    type: MultiImageNav-v1
    split: train
    data_path: /home/cyf/FGPrompt/data/datasets/multinav/gibson/v1/train/content/train_{num_agents}_agents_independent.json.gz
    scenes_dir: /home/cyf/FGPrompt/data/scene_datasets
    clip_goal_feature: data/datasets_subtasknav/gibson/goal_clip_features.db
